<!DOCTYPE html>
<html lang="de" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D'ouro Soulfood — Nav (Branded)</title>

  <!-- Google Fonts: Fraunces + DM Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,800;0,9..144,900;1,9..144,400;1,9..144,600&display=swap" />

  <script src="https://cdn.tailwindcss.com"></script>

  <style type="text/tailwindcss">
    @theme {
      --color-brand-terracotta: oklch(0.52 0.13 24);
      --color-brand-terracotta-light: oklch(0.63 0.12 24);
      --color-brand-terracotta-dark: oklch(0.38 0.12 22);
      --color-brand-gold: oklch(0.68 0.14 70);
      --color-brand-gold-light: oklch(0.78 0.12 70);
      --color-brand-gold-dark: oklch(0.53 0.12 68);
      --color-brand-forest: oklch(0.35 0.07 152);
      --color-brand-forest-light: oklch(0.44 0.09 152);
      --color-brand-sage: oklch(0.60 0.08 140);
      --color-brand-cream: oklch(0.95 0.015 80);
      --color-brand-cream-warm: oklch(0.93 0.02 75);
      --color-brand-mist: oklch(0.97 0.008 80);
      --color-brand-espresso: oklch(0.14 0.03 40);
      --color-brand-charcoal: oklch(0.12 0.01 0);
      --color-brand-smoke: oklch(0.17 0.01 0);
      --color-brand-ember: oklch(0.38 0.12 22);
      --color-surface-primary: oklch(0.06 0.01 0);
      --color-surface-elevated: oklch(0.10 0.012 0);
      --color-surface-card: oklch(0.13 0.014 0);
      --color-surface-glass: oklch(0.13 0.014 0 / 0.72);
      --color-surface-light: oklch(1.0 0 0);
      --color-surface-light-elevated: oklch(0.96 0.005 270);
      --color-text-primary: oklch(0.96 0.006 80);
      --color-text-secondary: oklch(0.68 0.012 60);
      --color-text-tertiary: oklch(0.50 0.01 50);
      --color-text-inverse: oklch(0.14 0.02 40);
      --color-text-brand: oklch(0.68 0.14 70);
      --color-border-subtle: oklch(0.96 0.006 80 / 0.08);
      --color-border-default: oklch(0.96 0.006 80 / 0.12);
      --color-border-emphasis: oklch(0.96 0.006 80 / 0.24);
      --font-display: 'Fraunces', 'Georgia', serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
    }

    * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    html { background-color: var(--color-surface-primary); color: var(--color-text-primary); }
    body { font-family: var(--font-body); line-height: 1.6; overflow-x: hidden; }
    h1, h2, h3, h4, h5, h6 { font-family: var(--font-display); line-height: 1.15; letter-spacing: -0.02em; }
  </style>
</head>
<body class="bg-surface-primary text-text-primary">

  <!-- ═══ NAV SECTION — D'ouro Branded (Glassmorphism) ═══ -->
  <nav aria-label="Main menu" class="sticky top-0 z-30 bg-surface-glass backdrop-blur-sm transition-all duration-300 border-b border-border-subtle">
    <div class="mx-auto flex max-w-7xl items-center px-4 py-4 md:px-8 gap-2">

      <!-- Logo — Brand name in display font -->
      <div class="md:shrink-0">
        <a href="/" class="flex items-center gap-1 no-underline">
          <span class="text-xl font-bold text-text-brand" style="font-family: var(--font-display)">D'ouro</span>
          <span class="text-sm text-text-secondary hidden sm:inline">Soulfood</span>
        </a>
      </div>

      <!-- Desktop Navigation Links -->
      <div class="hidden flex-1 justify-end items-center min-w-0 md:flex">
        <div class="relative w-full max-w-full">
          <div class="flex items-center justify-end gap-2 p-2">
            <!-- Nav links — secondary text, gold hover -->
            <div class="flex gap-2 items-center min-w-0">
              <div class="flex gap-2 items-center">
                <a href="/menu" class="flex min-h-10 items-center px-3 py-2 text-sm font-medium whitespace-nowrap text-text-secondary rounded-lg hover:bg-surface-elevated hover:text-text-primary no-underline transition-colors">Speisekarte</a>
                <a href="/catering" class="flex min-h-10 items-center px-3 py-2 text-sm font-medium whitespace-nowrap text-text-secondary rounded-lg hover:bg-surface-elevated hover:text-text-primary no-underline transition-colors">Catering</a>
                <a href="/ueber-uns" class="flex min-h-10 items-center px-3 py-2 text-sm font-medium whitespace-nowrap text-text-secondary rounded-lg hover:bg-surface-elevated hover:text-text-primary no-underline transition-colors">Über uns</a>
                <a href="/kontakt" class="flex min-h-10 items-center px-3 py-2 text-sm font-medium whitespace-nowrap text-text-secondary rounded-lg hover:bg-surface-elevated hover:text-text-primary no-underline transition-colors">Kontakt</a>
              </div>
            </div>

            <!-- Fixed right items -->
            <div class="flex gap-2 items-center shrink-0">
              <!-- Reservierung — secondary outlined -->
              <a href="/reservierung" class="flex min-h-10 items-center px-3 py-2 text-sm font-medium rounded-lg border border-border-default bg-surface-elevated hover:bg-surface-card hover:border-border-emphasis text-text-secondary no-underline transition-colors">Reservierung</a>

              <!-- Order CTA — brand gold with glow -->
              <a href="/order" class="group flex min-h-10 items-center px-4 py-2 text-sm font-semibold rounded-lg bg-brand-gold hover:bg-brand-gold-light text-brand-espresso no-underline transition-colors duration-200" style="box-shadow: 0 0 40px oklch(0.68 0.14 70 / 0.15)">
                <span class="flex items-center gap-1 whitespace-nowrap">Jetzt bestellen</span>
                <svg class="ml-1 w-4 h-4 opacity-50 group-hover:opacity-100 group-hover:translate-x-0.5 transition-all" viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="70" y1="128" x2="216" y2="128" />
                  <polyline points="144 56 216 128 144 200" />
                </svg>
              </a>
            </div>
          </div>
        </div>
      </div>

      <!-- Mobile Menu Button -->
      <div class="flex flex-1 justify-end items-center md:hidden">
        <div class="flex shrink-0 items-center gap-2 p-1 rounded-lg border border-transparent bg-surface-primary">
          <a href="/menu" class="flex min-h-10 items-center px-3 py-2 text-sm font-medium rounded-lg border border-border-default bg-surface-elevated text-text-secondary no-underline">Speisekarte</a>
          <button type="button" class="flex justify-center items-center w-10 h-10 rounded-lg hover:bg-surface-elevated transition-colors" aria-label="Open navigation menu" aria-expanded="false">
            <div class="flex flex-col gap-1.5 justify-center items-center w-6 h-6">
              <span class="block h-0.5 w-6 bg-text-primary rounded-full"></span>
              <span class="block h-0.5 w-6 bg-text-primary rounded-full"></span>
              <span class="block h-0.5 w-6 bg-text-primary rounded-full"></span>
            </div>
          </button>
        </div>
      </div>
    </div>

    <!-- Mobile Menu Overlay -->
    <div class="fixed top-20 right-0 bottom-0 left-0 z-40 bg-surface-primary opacity-0 pointer-events-none transition-opacity duration-300 md:hidden overflow-y-auto" role="dialog" aria-modal="true" aria-label="Navigation menu">
      <div class="mx-auto max-w-7xl px-4 py-6">
        <nav aria-label="Mobile navigation menu" class="flex flex-col gap-2">
          <a href="/reservierung" class="flex min-h-12 items-center px-4 py-3 text-base font-medium text-text-secondary rounded-lg hover:bg-surface-elevated no-underline transition-colors">Reservierung</a>
          <a href="/menu" class="flex min-h-12 items-center px-4 py-3 text-base font-medium text-text-secondary rounded-lg hover:bg-surface-elevated no-underline transition-colors">Speisekarte</a>
          <a href="/catering" class="flex min-h-12 items-center px-4 py-3 text-base font-medium text-text-secondary rounded-lg hover:bg-surface-elevated no-underline transition-colors">Catering</a>
          <a href="/ueber-uns" class="flex min-h-12 items-center px-4 py-3 text-base font-medium text-text-secondary rounded-lg hover:bg-surface-elevated no-underline transition-colors">Über uns</a>
          <a href="/kontakt" class="flex min-h-12 items-center px-4 py-3 text-base font-medium text-text-secondary rounded-lg hover:bg-surface-elevated no-underline transition-colors">Kontakt</a>
          <a href="/order" class="mt-4 flex items-center justify-center rounded-lg bg-brand-gold px-5 py-3 text-base font-semibold text-brand-espresso no-underline transition-colors duration-200" style="box-shadow: 0 0 40px oklch(0.68 0.14 70 / 0.15)">Jetzt bestellen</a>
        </nav>
      </div>
    </div>
  </nav>

</body>
</html>
