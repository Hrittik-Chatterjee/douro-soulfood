<header class="relative w-full overflow-hidden bg-gray-900">
  <!-- Hero image carousel background -->
  <div class="absolute top-0 left-0 w-full h-full overflow-hidden" role="region" aria-live="polite" aria-atomic="true" aria-label="Hero image carousel">
    <div class="absolute top-0 left-0 w-full h-full">
      <img src="/placeholder.jpg" alt="Restaurant hero image" class="absolute top-0 left-0 w-full h-full object-cover object-center" loading="eager" />
    </div>
    <!-- Gradient overlay -->
    <div class="absolute top-0 left-0 w-full h-full bg-gradient-to-b from-transparent via-transparent to-gray-900/75"></div>
  </div>

  <!-- Hero content -->
  <div class="max-w-7xl mx-auto mt-4 mb-4 flex flex-col items-center pt-0 md:min-h-160 min-h-125 md:h-screen">
    <div class="relative w-full flex-1 flex flex-col">
      <div class="max-w-full flex-1 flex flex-col justify-end gap-6 px-4 md:px-8 py-6">
        <div class="max-w-7xl">
          <div class="flex flex-col gap-2 lg:gap-3">
            <!-- Small headline -->
            <h1 class="text-sm md:text-2xl lg:text-3xl font-semibold text-gray-100 leading-tight tracking-tight overflow-hidden text-ellipsis whitespace-nowrap inline-block max-w-full">
              Restaurant Tagline Here
            </h1>
            <!-- Large promo text -->
            <span class="text-3xl md:text-5xl font-semibold text-gray-100 leading-tight normal-case">
              Featured promotional message with special offer details goes here
            </span>
          </div>

          <!-- CTA button (desktop) -->
          <div class="hidden md:flex mt-6">
            <a href="/order" class="group flex min-h-12 items-center px-4 py-3 text-base font-semibold rounded-lg bg-gray-500 hover:bg-gray-400 text-gray-900 no-underline">
              <span class="flex items-center gap-1 whitespace-nowrap">Order online</span>
              <svg class="ml-1 w-4 h-4 opacity-50 group-hover:opacity-100 group-hover:translate-x-0.5 transition-all" viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-width="24" stroke-linecap="round" stroke-linejoin="round">
                <line x1="70" y1="128" x2="216" y2="128" />
                <polyline points="144 56 216 128 144 200" />
              </svg>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>
